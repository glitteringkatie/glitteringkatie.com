<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmarks — glittering katie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+Pro:ital,wght@0,400;0,600;1,400&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header>
    <nav class="site-nav">
      <a class="site-logo" href="/" aria-label="glittering katie home page">
        <img src="glitteringkatie.svg" alt="glittering katie" width="240" height="37" />
      </a>
      <div class="view-toggle" role="group" aria-label="Switch view">
        <button id="btn-gallery" class="toggle-btn toggle-btn--active" aria-pressed="true">gallery</button>
        <button id="btn-map" class="toggle-btn" aria-pressed="false">map</button>
      </div>
    </nav>
  </header>

  <main>
    <section id="view-gallery" class="view view--active" aria-label="Bookmark gallery">
      <div id="gallery-grid" class="gallery-grid"></div>
    </section>

    <section id="view-map" class="view" aria-label="Bookstore map">
      <div id="map"></div>
    </section>
  </main>

  <div id="store-modal" class="store-modal" role="dialog" aria-modal="true" aria-label="Bookstore bookmarks" hidden>
    <div class="store-modal__backdrop"></div>
    <div class="store-modal__panel">
      <button class="store-modal__close" aria-label="Close">&#x2715;</button>
      <h2 class="store-modal__store-name"></h2>
      <p class="store-modal__city"></p>
      <a class="store-modal__link" target="_blank" rel="noopener noreferrer" hidden></a>
      <div class="store-modal__bookmarks"></div>
    </div>
  </div>

  <footer class="site-footer">
    <p>Katie Hughes &copy; <span id="footer-year"></span>. <a href="/">glittering katie</a>.</p>
  </footer>

  <script>document.getElementById('footer-year').textContent = new Date().getFullYear();</script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
